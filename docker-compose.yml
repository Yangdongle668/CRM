services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: always
    environment:
      POSTGRES_DB: trade_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crm_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d trade_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD:-crm_password}@postgres:5432/trade_crm?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-in-production}
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      # 邮件追踪像素 / 点击链接里用的对外地址 — 必须是收件人的邮件客户端
      # 可以访问到的域名，不能是 docker 内部 service 名。
      APP_URL: ${APP_URL:-https://crm.07691688.xyz}
      CORS_ORIGIN: ${APP_URL:-https://crm.07691688.xyz}
      # HMAC secret for tracking click tokens (falls back to JWT_SECRET
      # if unset, but you should use a distinct value in production).
      EMAIL_TRACKING_SECRET: ${EMAIL_TRACKING_SECRET:-${JWT_SECRET:-change-this-tracking-secret}}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:3001
    container_name: crm-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    depends_on:
      - backend

  # Nginx 反向代理 + SSL 终止
  nginx:
    image: nginx:alpine
    container_name: crm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL 证书 —— 直接挂载 1Panel 维护的目录，证书续期自动生效
      - /opt/1panel/www/sites/crm.07691688.xyz/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
