# ============================================
# CRM 反向代理 + SSL 终止
# ============================================
# 由 docker-compose 里的 crm-nginx 容器运行（基于 nginx:alpine）。
# 不再需要 1Panel OpenResty 在前面 —— 客户端直接打到本容器的 80/443。
#
# 上游目标走 docker 内部网络的服务名（不是 127.0.0.1）：
#   frontend:3000  (Next.js SSR)
#   backend:3001   (NestJS — /api/*, /uploads/*, /socket.io/*, /api-docs)
#
# SSL 证书：在 docker-compose.yml 里把
#   /opt/1panel/www/sites/crm.07691688.xyz/ssl
# 只读挂载到容器的 /etc/nginx/ssl
# ============================================

events {
    worker_connections 2048;
}

http {
    # MIME / 默认类型
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 真实 IP 处理（如果以后还有上游代理时方便）
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/rss+xml application/atom+xml image/svg+xml;

    # 日志
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }
    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    # ============================================
    # HTTP :80 — Let's Encrypt 验证 + HTTPS 跳转
    # ============================================
    server {
        listen      80;
        listen      [::]:80;
        server_name crm.07691688.xyz www.crm.07691688.xyz;

        # ACME challenge（如果以后续期证书要走 webroot 模式）
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # HTTPS :443 — 主站
    # ============================================
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;
        server_name crm.07691688.xyz www.crm.07691688.xyz;

        # SSL 证书（从宿主机挂载，路径见 docker-compose.yml volumes）
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL 调优
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # 安全 / 反爬头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

        # 上传上限 — 备份恢复 ZIP 后端最大允许 200M
        client_max_body_size 200M;

        # robots.txt
        location = /robots.txt {
            add_header Content-Type text/plain;
            return 200 "User-agent: *\nDisallow: /\n";
        }

        # ========================================
        # 后端 API (NestJS at backend:3001, setGlobalPrefix('api'))
        # ^~ 阻止下方 .png/.css 正则误命中 /api/emails/track/.../pixel.png
        # ========================================
        location ^~ /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # 备份导入 200MB 上传 + 备份导出流式 ZIP 下载
            proxy_request_buffering off;
            proxy_buffering off;
        }

        # ========================================
        # 上传文件 (NestJS main.ts: app.use('/uploads', static))
        # ========================================
        location ^~ /uploads/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 7d;
            access_log off;
        }

        # ========================================
        # Socket.IO WebSocket (实时消息)
        # 客户端真正发请求的 path 就是 /socket.io/，namespace 仅在握手 payload
        # ========================================
        location ^~ /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ========================================
        # /ws/* 兜底 — 实际 socket.io 走 /socket.io/，
        # 这里是给 Next.js next.config.js rewrite 的兼容路径
        # ========================================
        location ^~ /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
        }

        # ========================================
        # Swagger 文档（NestJS 默认路径 /api-docs）
        # 生产不想暴露的话可整段注释
        # ========================================
        location ^~ /api-docs {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 静态资源长缓存（Next.js _next/static 等）
        # 优先级低于上方 ^~ 块，所以不会误伤后端 API 里的 .png 像素
        # ========================================
        location ~* \.(jpg|jpeg|png|gif|ico|svg|css|js|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ========================================
        # 前端 (Next.js SSR at frontend:3000) — 兜底
        # 不要用 try_files；Next.js 是动态渲染
        # ========================================
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
