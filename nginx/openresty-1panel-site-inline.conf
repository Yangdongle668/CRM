# ============================================
# 1Panel 网站 "自定义配置" 粘贴版 — CRM
# ============================================
# 这个文件的内容是给 1Panel 网站编辑 UI 的 "自定义配置" / "伪静态"
# 输入框用的，因为 1Panel 已经自动为网站生成了外层的：
#   server { listen 443 ssl; ssl_certificate ...; ... }
# 所以这里 **不要** 包含 server { }、listen、ssl_certificate 这些
# 外层指令 —— 只放 location 块 + server-level 指令（如
# client_max_body_size）。
#
# 如果你要用独立的 conf.d/*.conf 文件方式部署，看旁边的
# openresty-1panel.conf —— 那个是完整 standalone 版，带 server 块。
# ============================================
#
# 使用方法（1Panel）：
#   1) 网站 → 进入你的网站 → 配置 → "自定义配置"（有些版本叫 "伪静态" 或 "其他"）
#   2) 粘贴下面所有内容
#   3) 保存，1Panel 会自动 nginx -t 并 reload
#
# ============================================

# 上传大小限制 — 200M 用于备份恢复 (backup import ZIP)
client_max_body_size 200M;

# robots.txt
location = /robots.txt {
    add_header Content-Type text/plain;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;
    return 200 "User-agent: *\nDisallow: /\n";
}

# ============================================
# 后端 API (NestJS at :3001)
# 使用 ^~ 保证它优先于下方的正则静态块 —— 否则
# /api/emails/track/xxx/pixel.png 会被正则 .(png)$ 错误路由到前端
# ============================================
location ^~ /api/ {
    proxy_pass http://127.0.0.1:3001/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # 让后端能还原真实公网域名 —— 邮件追踪像素 URL 必须用这个
    proxy_set_header X-Forwarded-Host $host;

    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # 备份导入 200MB ZIP 上传 + 备份导出流式 ZIP 下载
    proxy_request_buffering off;
    proxy_buffering off;

    # 连接重试
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;
}

# ============================================
# 用户上传的文件 (NestJS main.ts: app.use('/uploads', static))
# 包含：头像 / 报价单 PDF / 备份 ZIP / 邮件附件
# ============================================
location ^~ /uploads/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 7d;
    access_log off;
}

# ============================================
# Socket.IO WebSocket —— 实时消息通道
# ============================================
location ^~ /socket.io/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# ============================================
# /ws/* 兼容路径（Next.js next.config.js rewrite 的兜底）
# ============================================
location ^~ /ws/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
}

# ============================================
# Swagger 文档 (NestJS: SwaggerModule.setup('api-docs', ...))
# 生产不想暴露的话把这段注释掉
# ============================================
location ^~ /api-docs {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ============================================
# 静态资源长缓存
# ============================================
location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://127.0.0.1:3000;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# ============================================
# 前端 (Next.js SSR at :3000) —— 兜底
# ⚠️ 如果 1Panel 已经为网站生成了默认的 location / { proxy_pass ... }，
#    这段可能和它冲突。两种处理：
#    (A) 把 1Panel UI 里的"反向代理"目标设为 http://127.0.0.1:3000，
#        然后 **删除** 下面这个 location / 块（由 1Panel 管理）
#    (B) 或者让 1Panel 不要生成默认 location /，由我们这里全权接管
# ============================================
location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 75s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# ============================================
# location 匹配优先级（从上到下）：
#   = /robots.txt                (精确)
#   ^~ /api/                     (前缀锁定，压过正则)
#   ^~ /uploads/                 (前缀锁定)
#   ^~ /socket.io/               (前缀锁定)
#   ^~ /ws/                      (前缀锁定)
#   ^~ /api-docs                 (前缀锁定)
#   ~* \.(jpg|png|…)             (正则)
#   /                            (最长前缀兜底)
# ============================================

# ============================================
# 部署后验证
# ============================================
#   curl -I https://crm.07691688.xyz/                           → 200
#   curl -I https://crm.07691688.xyz/api/auth/check-init        → 200
#   curl -I https://crm.07691688.xyz/api/emails/track/any/pixel.png
#     → 200, Content-Type: image/gif
#   curl -I https://crm.07691688.xyz/uploads/                   → 404（正常，根路径没文件）
#   curl -I 'https://crm.07691688.xyz/socket.io/?EIO=4&transport=polling'
#     → 200, 返回 socket.io session JSON
# ============================================
