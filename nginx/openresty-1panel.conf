# ============================================
# 1Panel OpenResty 反向代理 — CRM 生产配置
# ============================================
# 终端由 1Panel 的 OpenResty 处理 80/443，反代到 docker-compose
# 里暴露在宿主机上的前端/后端端口。
#
# 对应的 docker-compose 端口（仓库根目录 docker-compose.yml）：
#   backend   0.0.0.0:3001 -> 3001/tcp       (NestJS)
#   frontend  0.0.0.0:3000 -> 3000/tcp       (Next.js SSR)
#   nginx     0.0.0.0:80   -> 80/tcp         ← 多余，建议注释掉该服务
#
# ⚠️ docker-compose.yml 里那个 crm-nginx 服务已经被本配置替代，
#    建议把它在 compose 里注释掉（或改端口避开 80）避免无意义的资源占用。
#
# 路径路由（基于后端实际源码核对）：
#   /api/*         → backend:3001  (NestJS setGlobalPrefix('api'))
#   /uploads/*     → backend:3001  (main.ts app.use('/uploads', static))
#   /socket.io/*   → backend:3001  (Messages WebSocket gateway)
#   /api-docs      → backend:3001  (NestJS SwaggerModule.setup('api-docs'))
#   /              → frontend:3000 (Next.js SSR, 不要用 try_files)
# ============================================

# HTTP → HTTPS
# ⚠️ 1Panel OpenResty HTTP 监听端口改为 82（非默认 80，用于避让宿主机上其他服务）
# 如果是通过反代 / CDN 回源到 :82，客户端实际访问的仍是 https://crm.07691688.xyz
server {
    listen 82;
    server_name crm.07691688.xyz www.crm.07691688.xyz;

    location /.well-known/acme-challenge/ {
        root /www/wwwroot/crm.07691688.xyz;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name crm.07691688.xyz www.crm.07691688.xyz;

    # SSL 证书（1Panel 标准路径）
    ssl_certificate /www/sites/crm.07691688.xyz/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/crm.07691688.xyz/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling（如果证书支持可取消注释）
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /www/sites/crm.07691688.xyz/ssl/fullchain.pem;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;

    # 上传大小限制 — 200M 用于备份恢复 (backup import ZIP, 后端上限也是 200MB)
    client_max_body_size 200M;

    # robots.txt
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # ============================================
    # 后端 API (NestJS at :3001)
    # 使用 ^~ 保证它优先于下方的正则静态块 —— 否则
    # /api/emails/track/xxx/pixel.png 会被正则 .(png)$ 错误路由到前端。
    # ============================================
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 让后端能还原真实公网域名 —— 邮件追踪像素 URL 必须用这个
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 备份导入 200MB ZIP 上传 + 备份导出流式 ZIP 下载
        proxy_request_buffering off;
        proxy_buffering off;

        # 连接重试
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_fallback;
    }

    # 后端不可用时的降级响应
    location @backend_fallback {
        default_type application/json;
        return 503 '{"error":"SERVICE_UNAVAILABLE","message":"后端服务暂时不可用，请稍后重试"}';
    }

    # ============================================
    # 用户上传的文件 (NestJS main.ts: app.use('/uploads', static))
    # 包含：头像 / 报价单 PDF / 备份 ZIP / 邮件附件
    # ============================================
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        access_log off;
    }

    # ============================================
    # Socket.IO WebSocket
    # Messages gateway 命名空间是 /ws/messages，但 socket.io 客户端
    # 真正发的 HTTP 请求路径是 /socket.io/ —— namespace 仅在握手负载里。
    # 这里是实时消息通道能否 work 的关键。
    # ============================================
    location ^~ /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 长连接
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ============================================
    # /ws/* 兼容路径 —— 实际上 socket.io-client 走 /socket.io/，
    # 这段是给前端 Next.js next.config.js 里那条 rewrite 的兜底。
    # 注意 proxy_pass 不带尾 /，否则前缀会被剥掉。
    # ============================================
    location ^~ /ws/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # ============================================
    # Swagger API 文档 (NestJS: SwaggerModule.setup('api-docs', ...))
    # ⚠️ 注意：NestJS 的 Swagger 路径是 /api-docs（不是 Spring Boot 的 /swagger-ui.html）
    # 如果生产环境不想对外暴露接口文档，把整段注释掉即可。
    # ============================================
    location ^~ /api-docs {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # 静态资源长缓存
    # 说明：这是正则 location，优先级在普通前缀之前。上方所有
    # ^~ 前缀都会在它之前匹配，所以不会误伤 /api/.../*.png 之类。
    # ============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # 前端 (Next.js SSR at :3000) —— 兜底
    # ⚠️ 不要用 try_files $uri $uri/ /index.html，Next.js 是动态渲染，
    #    那行是给纯静态 SPA 的，用了会全站 404。
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 75s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ============================================
# location 匹配优先级（从上到下）
# ============================================
#   = /robots.txt                (精确 exact)
#   ^~ /api/                     (前缀，锁定 —— 压过正则)
#   ^~ /uploads/                 (前缀，锁定)
#   ^~ /socket.io/               (前缀，锁定)
#   ^~ /ws/                      (前缀，锁定)
#   ^~ /api-docs                 (前缀，锁定)
#   ~* \.(jpg|png|...)           (正则)
#   /                            (最长前缀兜底)
# ============================================

# ============================================
# 部署后验证
# ============================================
#   # nginx 语法
#   nginx -t
#
#   # 前端
#   curl -I https://crm.07691688.xyz/                 → 200
#
#   # API
#   curl -I https://crm.07691688.xyz/api/auth/check-init   → 200
#
#   # 🔑 邮件追踪像素（之前会被 .png 正则误命中，现在 ^~ 修好了）
#   curl -I https://crm.07691688.xyz/api/emails/track/any/pixel.png
#   → 200, Content-Type: image/gif
#
#   # 上传文件（根路径应为 404，不应为 502）
#   curl -I https://crm.07691688.xyz/uploads/
#
#   # Socket.IO 握手
#   curl -I 'https://crm.07691688.xyz/socket.io/?EIO=4&transport=polling'
#   → 200, 返回 socket.io session JSON
# ============================================
