# ============================================
# 1Panel OpenResty 完整配置（含SSL）— 已针对本 CRM 项目修正
# ============================================
# 此配置文件适用于 1Panel 环境，包含 SSL 证书配置
# 域名：crm.07691688.xyz
#
# 与用户原始配置相比的关键修正：
#   1. client_max_body_size 100M → 200M（备份恢复允许 200MB ZIP）
#   2. location / 删除了 try_files（Next.js 是 SSR，不是静态 SPA）
#   3. location /api/ 改为 ^~ /api/ 防止正则静态块错误命中追踪像素
#      (.../pixel.png)，并加上 X-Forwarded-Host + 关掉 proxy buffering
#      让备份流式导入/导出可行
#   4. 新增 /uploads/ 代理（头像 / 报价 PDF / 备份包 / 邮件附件）
#   5. 新增 /socket.io/ 代理（实时消息 WebSocket，强制必需）
#   6. /ws/ 的 proxy_pass 去掉尾 /（原先会剥掉 /ws/ 前缀）并加 ^~
#   7. Swagger 路径从 Spring Boot 的 /swagger-ui.html + /v3/api-docs
#      改为 NestJS 的 /api-docs（生产可选：直接删除）
#
# 使用方法：
# 1. 在1Panel中创建网站（反向代理类型）
# 2. 启用SSL（Let's Encrypt或上传证书）
# 3. 将此配置添加到网站的"高级设置"或"自定义配置"中
# 4. 确保SSL证书路径正确
# ============================================

# HTTP服务器（重定向到HTTPS）
server {
    listen 80;
    server_name crm.07691688.xyz www.crm.07691688.xyz;

    # 允许Let's Encrypt验证
    location /.well-known/acme-challenge/ {
        root /www/wwwroot/crm.07691688.xyz;
    }

    # HTTP到HTTPS重定向
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS服务器
server {
    listen 443 ssl;
    http2 on;
    server_name crm.07691688.xyz www.crm.07691688.xyz;

    # SSL证书配置（1Panel标准路径）
    ssl_certificate /www/sites/crm.07691688.xyz/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/crm.07691688.xyz/ssl/privkey.pem;

    # SSL优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling（如果证书支持OCSP，取消注释以下3行）
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /www/sites/crm.07691688.xyz/ssl/fullchain.pem;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # 阻止所有爬虫
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;

    # 日志配置（1Panel会自动管理日志，如需自定义请取消注释并确保目录存在）
    # access_log /www/wwwlogs/crm.07691688.xyz.log;
    # error_log /www/wwwlogs/crm.07691688.xyz.error.log;

    # 客户端最大上传大小 — 200M 用于备份 ZIP 恢复
    client_max_body_size 200M;

    # robots.txt 文件
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # ============================================
    # API后端代理 — 使用 ^~ 优先级压过下方的正则静态块，
    # 防止 /api/emails/track/xxx/pixel.png 等追踪像素被误路由到前端
    # ============================================
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:18080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 让后端能还原真实公网域名（邮件追踪像素 URL 用）
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;

        # 备份导入 200MB ZIP 上传 / 备份导出流式 ZIP 下载
        proxy_request_buffering off;
        proxy_buffering off;

        # 增加连接重试
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;

        # 错误页面（可选）
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_fallback;
    }

    # 后端服务不可用时的降级处理
    location @backend_fallback {
        default_type application/json;
        return 503 '{"error":"SERVICE_UNAVAILABLE","message":"后端服务暂时不可用，请稍后重试"}';
    }

    # ============================================
    # 用户上传的文件（头像 / 报价 PDF / 备份包 / 邮件附件）
    # ============================================
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        access_log off;
    }

    # ============================================
    # Socket.IO WebSocket（实时消息通道）
    # 前端 socket.io-client 的默认路径就是 /socket.io/
    # ============================================
    location ^~ /socket.io/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 长连接需要长超时
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ============================================
    # NestJS WebSocket 命名空间（/ws/messages 等）
    # 注意：proxy_pass 不带尾 /，否则会剥掉 /ws/ 前缀
    # ============================================
    location ^~ /ws/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # ============================================
    # Swagger 文档代理 — NestJS 路径是 /api-docs
    # 生产环境不想暴露接口文档的话可以整段删除
    # ============================================
    location ^~ /api-docs {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # 健康检查端点
    # ============================================
    location /health {
        proxy_pass http://127.0.0.1:18000/health;
        access_log off;
    }

    # ============================================
    # 静态资源缓存（前端 _next/static 等）
    # 注意：此正则本来会优先匹配 /api/emails/track/xxx/pixel.png，
    # 但上方 /api/ 用了 ^~ 所以已经排除了这种误命中
    # ============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:18000;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # 前端静态文件代理（Next.js SSR）
    # 注意：不要使用 try_files —— Next.js 是动态渲染，不是静态 SPA
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }
}

# ============================================
# 配置说明
# ============================================
#
# 1. 域名配置：
#    - 将 crm.07691688.xyz 替换为您的实际域名
#    - 如果不需要 www 子域名，可以删除相关配置
#
# 2. SSL证书路径：
#    - 证书：/www/sites/crm.07691688.xyz/ssl/fullchain.pem
#    - 私钥：/www/sites/crm.07691688.xyz/ssl/privkey.pem
#    - 如果1Panel的证书路径不同，请相应修改
#    - OCSP Stapling已注释，如果证书支持OCSP，可以取消注释相关配置
#
# 3. 端口配置：
#    - 前端：18000（FRONTEND_PORT）
#    - 后端：18080（BACKEND_PORT）
#    - 如果 docker-compose 中的端口不同，请相应更新此配置
#
# 4. 日志配置：
#    - 日志配置已注释，1Panel会自动管理日志
#    - 如需自定义日志路径，请取消注释并确保目录存在
#    - 或使用1Panel的日志管理功能
#
# 5. 在1Panel中使用：
#    - 创建网站后，在"高级设置"或"自定义配置"中粘贴此配置
#    - 如果1Panel有SSL自动配置，可以只使用 location 块部分
#    - 确保修改域名和证书路径
#
# 6. 验证配置：
#    nginx -t
#    curl -I https://crm.07691688.xyz/api/auth/check-init              # API
#    curl -I https://crm.07691688.xyz/api/emails/track/x/pixel.png     # 追踪像素
#    curl -I https://crm.07691688.xyz/uploads/                         # 静态文件
#    curl -I 'https://crm.07691688.xyz/socket.io/?EIO=4&transport=polling'
#
# 7. location 匹配优先级（从上到下）：
#    = /robots.txt                    (exact)
#    ^~ /api/                         (prefix, 压过正则)
#    ^~ /uploads/                     (prefix)
#    ^~ /socket.io/                   (prefix)
#    ^~ /ws/                          (prefix)
#    ^~ /api-docs                     (prefix)
#    /health                          (prefix)
#    ~* \.(jpg|png|...)               (regex)
#    /                                (prefix, 兜底)
#
# ============================================
